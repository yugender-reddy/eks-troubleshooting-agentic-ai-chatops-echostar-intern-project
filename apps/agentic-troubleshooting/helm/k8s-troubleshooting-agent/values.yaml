replicaCount: 1

image:
  repository: your-account.dkr.ecr.us-west-2.amazonaws.com/k8s-troubleshooting-agent
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

# EKS Pod Identity configuration (no annotations needed)
serviceAccount:
  create: true
  name: "k8s-troubleshooting-agent"

# Application configuration
config:
  clusterName: ""
  awsRegion: "us-west-2"
  bedrockModelId: "amazon.nova-micro-v1:0"
  logLevel: "INFO"
  
  # Vector Storage Configuration
  vectorBucket: "test-vector-s3-bucket-321"
  indexName: "k8s-troubleshooting"
  
  # Memory Agent Configuration
  memoryAgentServerUrl: "http://localhost:9000"
  
  # EKS MCP settings
  eksMcp:
    enabled: true
    allowWrite: false

  # Google Chat configuration
  gchat:
    projectId: ""
    projectNumber: ""
    serviceAccountKeyPath: "/secrets/gchat/service-account-key.json"

  # Chat platform: 'slack' uses Socket Mode (no NLB), 'gchat' uses HTTP webhook (NLB required)
  chatPlatform: "slack"

  # Mock mode: set to "false" once real credentials are available
  mockMode: "true"

# Secrets (Google Chat service account key)
secrets:
  gchat:
    # Base64-encoded service account JSON key content
    serviceAccountKey: ""

# Service configuration
# For Slack (Socket Mode): ClusterIP is sufficient — no inbound traffic needed
# For Google Chat: LoadBalancer provisions an NLB for Google to POST webhook events to
service:
  type: ClusterIP
  port: 80
  annotations: {}

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}

# RBAC for Kubernetes API access
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "services", "events"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "replicasets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["pods/log"]
      verbs: ["get"]
