apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-troubleshooting-agent.fullname" . }}
  labels:
    {{- include "k8s-troubleshooting-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-troubleshooting-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "k8s-troubleshooting-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "k8s-troubleshooting-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: kubeconfig-init
          image: amazon/aws-cli:2.15.30
          command:
            - /bin/sh
            - -c
            - |
              # Generate kubeconfig using EKS
              aws eks update-kubeconfig --region {{ .Values.config.awsRegion }} --name {{ .Values.config.clusterName }} --kubeconfig /shared/kubeconfig
              echo "EKS kubeconfig created successfully"
          env:
            - name: AWS_REGION
              value: {{ .Values.config.awsRegion | quote }}
          volumeMounts:
            - name: kubeconfig-volume
              mountPath: /shared
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CLUSTER_NAME
              value: {{ .Values.config.clusterName | quote }}
            - name: AWS_REGION
              value: {{ .Values.config.awsRegion | quote }}
            - name: BEDROCK_MODEL_ID
              value: {{ .Values.config.bedrockModelId | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: ENABLE_EKS_MCP
              value: {{ .Values.config.eksMcp.enabled | quote }}
            - name: EKS_MCP_ALLOW_WRITE
              value: {{ .Values.config.eksMcp.allowWrite | quote }}
            - name: KUBECONFIG
              value: /shared/kubeconfig
            # Vector Storage Configuration
            - name: VECTOR_BUCKET
              value: {{ .Values.config.vectorBucket | quote }}
            - name: INDEX_NAME
              value: {{ .Values.config.indexName | quote }}
            # Memory Agent A2A URL (disabled - uncomment when memory agent is connected)
            # - name: MEMORY_AGENT_SERVER_URL
            #   value: "http://localhost:9000"
            # Google Chat Configuration
            - name: MOCK_MODE
              value: {{ .Values.config.mockMode | quote }}
            - name: CHAT_PLATFORM
              value: {{ .Values.config.chatPlatform | default "slack" | quote }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ .Values.config.gchat.serviceAccountKeyPath | quote }}
            - name: GCHAT_PROJECT_ID
              value: {{ .Values.config.gchat.projectId | quote }}
            - name: GCHAT_PROJECT_NUMBER
              value: {{ .Values.config.gchat.projectNumber | quote }}
          volumeMounts:
            - name: kubeconfig-volume
              mountPath: /shared
              readOnly: true
            - name: gchat-secret
              mountPath: /secrets/gchat
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
        # NOTE: Memory agent sidecar is disabled until memory_agent_server is connected.
        # Uncomment the block below when ready to enable the memory agent.
        # - name: memory-agent
        #   securityContext:
        #     {{- toYaml .Values.securityContext | nindent 12 }}
        #   image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        #   imagePullPolicy: {{ .Values.image.pullPolicy }}
        #   command: ["python", "memory_agent_main.py"]
        #   env:
        #     - name: AWS_REGION
        #       value: {{ .Values.config.awsRegion | quote }}
        #     - name: BEDROCK_MODEL_ID
        #       value: {{ .Values.config.bedrockModelId | quote }}
        #     - name: LOG_LEVEL
        #       value: {{ .Values.config.logLevel | quote }}
        #     # Vector Storage Configuration
        #     - name: VECTOR_BUCKET
        #       value: {{ .Values.config.vectorBucket | quote }}
        #     - name: INDEX_NAME
        #       value: {{ .Values.config.indexName | quote }}
        #   ports:
        #     - name: a2a
        #       containerPort: 9000
        #       protocol: TCP
        #   resources:
        #     limits:
        #       cpu: 250m
        #       memory: 256Mi
        #     requests:
        #       cpu: 50m
        #       memory: 128Mi
        #   livenessProbe:
        #     tcpSocket:
        #       port: 9000
        #     initialDelaySeconds: 30
        #     periodSeconds: 30
        #     failureThreshold: 3
        #   readinessProbe:
        #     tcpSocket:
        #       port: 9000
        #     initialDelaySeconds: 10
        #     periodSeconds: 10
      volumes:
        - name: kubeconfig-volume
          emptyDir: {}
        - name: gchat-secret
          secret:
            secretName: {{ include "k8s-troubleshooting-agent.fullname" . }}-gchat
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
